<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sponsors | Beta Alpha Psi – Stony Brook</title>
  <link rel="icon" href="/assets/images/bap-logo.png" type="image/png">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <section class="page-content">
      <div class="container">
        <div class="section-header reveal">
          <h2>Accounting Advisory Board</h2>
          <hr class="divider">
        </div>
        <div class="sponsor-grid reveal" id="aab-grid"></div>

        <div class="section-header reveal" style="margin-top: 3rem;">
          <h2>Sponsors</h2>
          <hr class="divider">
        </div>
        <div class="sponsor-grid sponsor-grid-single reveal" id="sponsor-grid"></div>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script type="module">
    import { advisoryBoard, sponsors } from '/js/site-config.js';

    function renderSponsor(sponsor) {
      return `
        <a href="${sponsor.url}" class="sponsor-card" target="_blank" rel="noopener noreferrer">
          <img src="${sponsor.logo}" alt="${sponsor.name} logo" class="sponsor-logo" loading="lazy">
        </a>
      `;
    }

    document.getElementById('aab-grid').innerHTML = advisoryBoard.map(renderSponsor).join('');
    document.getElementById('sponsor-grid').innerHTML = sponsors.map(renderSponsor).join('');
  </script>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
