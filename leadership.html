<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leadership | Beta Alpha Psi – Stony Brook</title>
  <link rel="icon" href="/assets/images/bap-logo.png" type="image/png">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="site-header"></div>
  <main>
    <section class="page-hero">
      <div class="container">
        <h1>Leadership</h1>
      </div>
    </section>
    <section class="page-content">
      <div class="container">
        <div class="section-header reveal">
          <h2>Executive Board</h2>
          <hr class="divider">
          <p class="section-term">Fall 2026 – Present</p>
        </div>
        <div class="board-list" id="board-grid"></div>

        <div class="section-header reveal" id="advisors" style="margin-top: 4rem;">
          <h2>Faculty Advisors</h2>
          <hr class="divider">
        </div>
        <div class="board-list" id="advisor-grid"></div>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script type="module">
    import { board, advisors } from '/js/site-config.js';
    import { initLayout } from '/js/layout.js';

    function renderProfile(person, isLast) {
      return `
        <article class="board-profile reveal">
          <div class="board-content">
            <h3 class="board-name">${person.name}</h3>
            <p class="board-role-line">${person.role}</p>
            <a href="mailto:${person.email}" class="board-email">${person.email}</a>
            <p class="board-bio">${person.bio}</p>
          </div>
          <img src="${person.photo}" alt="${person.name}" class="board-photo" width="300" height="300">
        </article>
        ${isLast ? '' : '<hr class="board-divider">'}
      `;
    }

    document.getElementById('board-grid').innerHTML = board
      .map((person, i) => renderProfile(person, i === board.length - 1))
      .join('');
    document.getElementById('advisor-grid').innerHTML = advisors
      .map((person, i) => renderProfile(person, i === advisors.length - 1))
      .join('');
  </script>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
